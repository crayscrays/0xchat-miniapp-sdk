<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Jar</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #fafafa;
        display: flex;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,.08);
        padding: 2rem;
        width: 100%;
        max-width: 420px;
      }
      h1 { font-size: 1.4rem; margin-bottom: .25rem; }
      .subtitle { color: #666; font-size: .9rem; margin-bottom: 1.5rem; }
      .field { margin-bottom: 1rem; }
      .field label { display: block; font-size: .8rem; color: #888; margin-bottom: .25rem; }
      .field span { font-size: 1rem; font-weight: 600; }
      button {
        width: 100%;
        padding: .75rem;
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        cursor: pointer;
        margin-top: .5rem;
      }
      button:disabled { opacity: .5; cursor: not-allowed; }
      #status { margin-top: 1rem; font-size: .875rem; text-align: center; color: #555; }
      .success { color: #16a34a !important; }
      .error { color: #dc2626 !important; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Tip Jar ☕</h1>
      <p class="subtitle">Send 1 USDC to support this mini-app</p>

      <div class="field">
        <label>Your wallet</label>
        <span id="address">Loading…</span>
      </div>
      <div class="field">
        <label>Your USDC balance</label>
        <span id="balance">—</span>
      </div>

      <button id="btn" disabled>Send 1 USDC</button>
      <p id="status"></p>
    </div>

    <script type="module">
      // Inline minimal bridge — replace with: import { createAppBridge } from "@0xchat/miniapp-sdk"
      const APP_ID = "tip-jar";
      const TIP_RECIPIENT = "0x742d35Cc6634C0532925a3b8D4C9b7b8f4b9c3d2";
      const USDC = "USDC";

      const pending = new Map();
      window.addEventListener("message", (e) => {
        const msg = e.data;
        if (!msg || msg.type !== "0xchat-bridge-response") return;
        const h = pending.get(msg.id);
        if (!h) return;
        clearTimeout(h.t);
        pending.delete(msg.id);
        msg.error ? h.reject(Object.assign(new Error(msg.error.message), { code: msg.error.code }))
                  : h.resolve(msg.result);
      });
      function request(method, params) {
        return new Promise((resolve, reject) => {
          const id = crypto.randomUUID();
          const t = setTimeout(() => { pending.delete(id); reject(new Error("timeout")); }, 30000);
          pending.set(id, { resolve, reject, t });
          window.parent.postMessage({ type: "0xchat-bridge", id, method, params, appId: APP_ID }, "*");
        });
      }

      const addressEl = document.getElementById("address");
      const balanceEl = document.getElementById("balance");
      const btn = document.getElementById("btn");
      const status = document.getElementById("status");

      async function init() {
        try {
          const addr = await request("wallet.getAddress");
          addressEl.textContent = addr.slice(0, 6) + "…" + addr.slice(-4);
          const bal = await request("wallet.getBalance", { token: USDC });
          balanceEl.textContent = bal + " USDC";
          btn.disabled = false;
        } catch (e) {
          addressEl.textContent = "Unavailable";
          status.textContent = e.message;
          status.className = "error";
        }
      }

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        status.textContent = "Waiting for confirmation…";
        status.className = "";
        try {
          const tx = await request("wallet.sendTransaction", {
            to: TIP_RECIPIENT,
            token: USDC,
            amount: "1.00",
          });
          status.textContent = "Tip sent! tx: " + tx.slice(0, 10) + "…";
          status.className = "success";
        } catch (e) {
          status.textContent = e.message;
          status.className = "error";
          btn.disabled = false;
        }
      });

      init();
    </script>
  </body>
</html>
